name: Validate Framework Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Framework Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run validate.sh
        run: |
          chmod +x .agentcortex/bin/validate.sh
          .agentcortex/bin/validate.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -x .agentcortex/bin/deploy.sh || true
          shellcheck -x .agentcortex/bin/validate.sh || true
          shellcheck -x installers/deploy_brain.sh || true

  markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        run: |
          STATUS=0
          while IFS= read -r file; do
            grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null | while read -r link; do
              # Skip external URLs, anchors, and mailto
              case "$link" in
                http://*|https://*|mailto:*|\#*) continue ;;
              esac
              # Strip anchor from path
              path="${link%%#*}"
              [ -z "$path" ] && continue
              # Resolve relative to file's directory
              dir="$(dirname "$file")"
              target="$dir/$path"
              if [ ! -e "$target" ]; then
                echo "BROKEN LINK: $file -> $link"
                STATUS=1
              fi
            done
          done < <(find . -name '*.md' -not -path './.git/*')
          exit $STATUS
