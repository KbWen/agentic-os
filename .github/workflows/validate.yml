name: Validate Framework Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Framework Validation (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run validate.sh
        run: |
          chmod +x .agentcortex/bin/validate.sh
          .agentcortex/bin/validate.sh

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint shell scripts
        run: |
          shopt -s globstar nullglob
          scripts=()
          for f in **/*.sh; do
            [[ -f "$f" ]] || continue
            scripts+=("$f")
          done
          if [[ ${#scripts[@]} -eq 0 ]]; then
            echo "No shell scripts found"
            exit 0
          fi
          failed=0
          for f in "${scripts[@]}"; do
            echo "::group::$f"
            if ! shellcheck -S warning -x "$f"; then
              failed=1
            fi
            echo "::endgroup::"
          done
          exit $failed

  markdown-links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check internal links
        run: |
          status=0
          while IFS= read -r file; do
            while IFS= read -r link; do
              # Skip external URLs, anchors, and mailto
              case "$link" in
                http://*|https://*|mailto:*|\#*) continue ;;
              esac
              # Strip anchor from path
              path="${link%%#*}"
              [ -z "$path" ] && continue
              # Resolve relative to file's directory
              dir="$(dirname "$file")"
              target="$dir/$path"
              if [ ! -e "$target" ]; then
                echo "::error file=$file::Broken link: $link"
                status=1
              fi
            done < <(grep -oP '\[.*?\]\(\K[^)]+' "$file" 2>/dev/null)
          done < <(find . -name '*.md' -not -path './.git/*')
          exit $status

  validate-windows:
    name: Framework Validation (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run validate.ps1
        shell: pwsh
        run: |
          .agentcortex/bin/validate.ps1

  deploy-smoke-test:
    name: Deploy Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Create test project and deploy
        run: |
          mkdir -p /tmp/test-project
          cd /tmp/test-project
          git init
          # Use canonical deploy.sh directly (deploy_brain.sh is a wrapper
          # meant for downstream repos, not source-repo CI).
          bash "$GITHUB_WORKSPACE/.agentcortex/bin/deploy.sh" .

      - name: Validate downstream project
        run: |
          cd /tmp/test-project
          bash .agentcortex/bin/validate.sh
